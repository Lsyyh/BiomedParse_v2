defaults:
  - language_encoder: seem_language_encoder
_target_: src.model.transformer_decoder.boltzformer_cls_decoder.BoltzFormerTextDecoder
in_channels: 512
hidden_dim: 512
dim_proj: 512
num_queries: 101
nheads: 8
dim_feedforward: 2048
pre_norm: false
enforce_input_project: false
dec_layers: 9
mask_dim: 512
boltzmann_sampling:
